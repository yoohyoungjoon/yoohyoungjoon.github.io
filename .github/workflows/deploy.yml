name: Deploy to GitHub Pages

on:
  # Build on every push to the default branch...
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel a run mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # withastro/action installs deps, runs `astro build`, and uploads the
        # `dist/` folder as a Pages artifact. Node/package-manager are auto-detected.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
